<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Еко-Варта: Чиста Орбіта</title>
    <style>
        body {
            margin: 0;
            background: #01060f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
        .status-bar {
            font-size: 22px;
            font-weight: bold;
            color: #00f2ff;
            text-shadow: 0 0 15px rgba(0,242,255,0.7);
            margin-bottom: 5px;
        }
        .hint {
            font-size: 14px;
            opacity: 0.8;
            background: rgba(0,0,0,0.4);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }
        #win-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }
        .btn {
            background: #39ff14;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="status-bar">ВІДНОВЛЕННЯ: <span id="percent">0</span>%</div>
    <div class="hint">🚀 Викидай: 🥤🔋✂️ | ✨ Збирай: 🌱💧♻️💎</div>
</div>

<div id="win-screen">
    <h1 style="color: #39ff14; font-size: 40px;">ПЛАНЕТУ ВРЯТОВАНО!</h1>
    <p style="font-size: 20px;">Ваш енергетичний код: <b style="font-size: 35px; color: #00f2ff; letter-spacing: 10px;">БАЛ</b></p>
    <button class="btn" onclick="location.reload()">ПОЧАТИ ЗНОВУ</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const percentText = document.getElementById('percent');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let earthSaturation = 0;
let objects = [];
let draggedObj = null;

const earth = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 60
};

// Списки ваших емодзі
const junkList = ['🥤', '🔋', '✂️', '🗑️', '🍾', '🥫'];
const ecoList = ['🌱', '💧', '♻️', '💎', '✨'];

class SpaceObject {
    constructor(type) {
        this.type = type; 
        this.emoji = type === 'junk' 
            ? junkList[Math.floor(Math.random() * junkList.length)] 
            : ecoList[Math.floor(Math.random() * ecoList.length)];
        
        const angle = Math.random() * Math.PI * 2;
        const dist = 160 + Math.random() * 90;
        this.x = earth.x + Math.cos(angle) * dist;
        this.y = earth.y + Math.sin(angle) * dist;
        
        // Повільний рух для комфорту очей
        this.speed = 0.002 + Math.random() * 0.004;
        this.angle = angle;
        this.dist = dist;
        this.vx = 0;
        this.vy = 0;
        this.isReleased = false;
        this.opacity = 0;
    }

    update() {
        if (this.opacity < 1) this.opacity += 0.03;

        if (!this.isReleased) {
            this.angle += this.speed;
            this.x = earth.x + Math.cos(this.angle) * this.dist;
            this.y = earth.y + Math.sin(this.angle) * this.dist;
        } else {
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= 0.97; 
            this.vy *= 0.97;

            const d = Math.hypot(this.x - earth.x, this.y - earth.y);
            
            // Сміття летить геть
            if (this.type === 'junk' && d > 650) {
                earthSaturation += 5; 
                return false;
            }
            
            // Еко-бонуси до Землі
            if (this.type === 'gem' && d < 55) {
                earthSaturation += 12; // Більше балів за еко-об'єкти
                return false;
            }
        }
        return true;
    }

    draw() {
        ctx.globalAlpha = this.opacity;
        ctx.font = "42px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(this.emoji, this.x, this.y);
        ctx.globalAlpha = 1;
    }
}

function spawn() {
    if (objects.length < 6) { 
        objects.push(new SpaceObject(Math.random() > 0.35 ? 'junk' : 'gem'));
    }
}

function drawEarth() {
    ctx.save();
    // Налаштування кольору Землі в залежності від успіху
    ctx.filter = `saturate(${earthSaturation}%) brightness(${50 + earthSaturation/2}%)`;
    ctx.font = "110px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("🌍", earth.x, earth.y);
    
    // Сяйво атмосфери
    if (earthSaturation > 10) {
        ctx.beginPath();
        ctx.arc(earth.x, earth.y, 65, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0, 242, 255, ${earthSaturation/150})`;
        ctx.lineWidth = 5;
        ctx.stroke();
    }
    ctx.restore();
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Малюємо зірки на фоні (статичні)
    ctx.fillStyle = "rgba(255,255,255,0.1)";
    for(let i=0; i<50; i++) {
        ctx.beginPath();
        ctx.arc((i*137)%canvas.width, (i*553)%canvas.height, 1, 0, 2*Math.PI);
        ctx.fill();
    }

    drawEarth();
    
    objects = objects.filter(obj => obj.update());
    objects.forEach(obj => obj.draw());
    
    const currentPercent = Math.min(100, Math.floor(earthSaturation));
    percentText.textContent = currentPercent;
    
    if (currentPercent >= 100) {
        document.getElementById('win-screen').style.display = 'flex';
    }

    spawn();
    requestAnimationFrame(update);
}

// Управління тачами
canvas.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    objects.forEach(obj => {
        if (Math.hypot(t.clientX - obj.x, t.clientY - obj.y) < 60) {
            draggedObj = obj;
            obj.isReleased = false;
        }
    });
});

canvas.addEventListener('touchmove', (e) => {
    if (draggedObj) {
        const t = e.touches[0];
        // Розрахунок вектору кидка
        draggedObj.vx = (t.clientX - draggedObj.x) * 0.7;
        draggedObj.vy = (t.clientY - draggedObj.y) * 0.7;
        draggedObj.x = t.clientX;
        draggedObj.y = t.clientY;
        draggedObj.isReleased = true; 
    }
});

canvas.addEventListener('touchend', () => { draggedObj = null; });

update();
</script>
</body>
</html>
