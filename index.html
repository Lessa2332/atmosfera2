<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Гео-Снайпер: Африка</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --cyber-blue: #050a30;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--cyber-blue);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Контур материка на фоні */
        #continent-map {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 400px;
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
            filter: drop-shadow(0 0 10px #00d4ff);
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .stat {
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #score { color: var(--neon-green); }

        /* Стиль міражів (Емодзі) */
        .mirage {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            user-select: none;
            z-index: 5;
            transition: transform 0.1s;
            animation: blink-mirage 1.5s infinite ease-in-out;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }

        @keyframes blink-mirage {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            50% { opacity: 0.4; transform: scale(1.1) rotate(0deg); }
            100% { opacity: 0; transform: scale(0.5) rotate(10deg); }
        }

        /* Ефекти */
        .hit-effect {
            position: absolute;
            pointer-events: none;
            animation: fade-up 0.5s forwards;
            font-weight: bold;
            z-index: 100;
        }

        @keyframes fade-up {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-50px); }
        }

        #win-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 10, 48, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
        }

        .btn {
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            margin-top: 20px;
            box-shadow: 0 0 20px var(--neon-green);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div class="stat">Очки: <span id="score-val">0</span></div>
        <div class="stat">Ціль: 1000</div>
    </div>

    <div id="continent-map">🌍<br>AFRICA</div>

    <div id="win-screen">
        <h1 style="color: var(--neon-green)">МІРАЖ СТАБІЛІЗОВАНО!</h1>
        <p>Ваш код: <span style="font-size: 30px; letter-spacing: 5px;">АНС</span></p>
        <button class="btn" onclick="window.location.reload()">ГРАТИ ЗНОВУ</button>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const scoreElement = document.getElementById('score-val');
    const winScreen = document.getElementById('win-screen');
    
    let score = 0;
    const targetScore = 1000;

    // Списки об'єктів
    const correctItems = ['🦁', '🦒', '🐘', '🏜️', '☕', '🦓', '🐆', '🌴'];
    const wrongItems = ['🐧', '🧊', '❄️', '🐻', '🎿', '🍓'];

    function createMirage() {
        if (score >= targetScore) return;

        const isCorrect = Math.random() > 0.4;
        const emoji = isCorrect 
            ? correctItems[Math.floor(Math.random() * correctItems.length)]
            : wrongItems[Math.floor(Math.random() * wrongItems.length)];

        const mirage = document.createElement('div');
        mirage.className = 'mirage';
        mirage.textContent = emoji;
        
        // Випадкова позиція (відступ від країв 15%)
        mirage.style.left = Math.random() * 70 + 15 + '%';
        mirage.style.top = Math.random() * 70 + 15 + '%';

        mirage.onclick = (e) => {
            if (isCorrect) {
                updateScore(100, e.clientX, e.clientY, "✅ +100", '#39ff14');
            } else {
                updateScore(-150, e.clientX, e.clientY, "❌ -150", '#ff3131');
            }
            mirage.remove();
        };

        container.appendChild(mirage);

        // Видалення міражу через 1.5 секунди
        setTimeout(() => {
            if (mirage.parentNode) mirage.remove();
        }, 1500);
    }

    function updateScore(amount, x, y, text, color) {
        score += amount;
        if (score < 0) score = 0;
        scoreElement.textContent = score;

        // Ефект тексту при кліку
        const effect = document.createElement('div');
        effect.className = 'hit-effect';
        effect.textContent = text;
        effect.style.left = x + 'px';
        effect.style.top = y + 'px';
        effect.style.color = color;
        container.appendChild(effect);
        setTimeout(() => effect.remove(), 500);

        if (score >= targetScore) {
            winScreen.style.display = 'flex';
        }
    }

    // Цикл появи міражів
    setInterval(createMirage, 800);
</script>

</body>
</html>
