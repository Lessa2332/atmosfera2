<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Космічний Сортувальник</title>
    <style>
        body {
            margin: 0;
            background: #000510;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: none;
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 10px #00f2ff;
        }
        #win-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .btn {
            background: #00f2ff;
            border: none;
            padding: 15px 30px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="ui">
    <h2>ОЧИЩЕННЯ ОРБІТИ: <span id="percent">0</span>%</h2>
    <p>Відкидай 🗑️ та 🛰️ подалі! Збирай 💎 до Землі!</p>
</div>

<div id="win-screen">
    <h1 style="color: #00f2ff;">МІСІЯ ВИКОНАНА!</h1>
    <p>Земля знову дихає. Ваш код: <b>БАЛ</b></p>
    <button class="btn" onclick="location.reload()">ПОВТОРИТИ</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const winScreen = document.getElementById('win-screen');
const percentText = document.getElementById('percent');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
const targetScore = 15; // Треба очистити 15 одиниць сміття
let earthSaturation = 0; // Стан Землі (від 0 до 100)
let objects = [];
let isDragging = false;
let draggedObj = null;

const earth = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 60
};

class SpaceObject {
    constructor(type) {
        this.type = type; // 'junk' або 'gem'
        this.emoji = type === 'junk' ? ['🗑️', '🛰️', '🌠'][Math.floor(Math.random()*3)] : '💎';
        
        // Початкова позиція на колі навколо Землі
        const angle = Math.random() * Math.PI * 2;
        const dist = 150 + Math.random() * 100;
        this.x = earth.x + Math.cos(angle) * dist;
        this.y = earth.y + Math.sin(angle) * dist;
        
        this.speed = 0.01 + Math.random() * 0.02;
        this.angle = angle;
        this.dist = dist;
        this.vx = 0;
        this.vy = 0;
        this.isKicked = false;
    }

    update() {
        if (!this.isKicked) {
            // Рух по орбіті
            this.angle += this.speed;
            this.x = earth.x + Math.cos(this.angle) * this.dist;
            this.y = earth.y + Math.sin(this.angle) * this.dist;
        } else {
            // Фізика польоту після свайпу
            this.x += this.vx;
            this.y += this.vy;
            
            // Перевірка дистанції для сміття (виліт за екран)
            const d = Math.hypot(this.x - earth.x, this.y - earth.y);
            if (this.type === 'junk' && d > 1000) return false;
            
            // Притягнення алмазів до Землі
            if (this.type === 'gem' && d < 50) {
                earthSaturation += 10;
                return false;
            }
        }
        return true;
    }

    draw() {
        ctx.font = "30px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(this.emoji, this.x, this.y);
    }
}

function spawn() {
    if (objects.length < 10) {
        objects.push(new SpaceObject(Math.random() > 0.3 ? 'junk' : 'gem'));
    }
}

function drawEarth() {
    ctx.save();
    // Ефект сірої/яскравої землі через фільтр
    ctx.filter = `saturate(${earthSaturation}%) brightness(${50 + earthSaturation/2}%)`;
    ctx.font = "80px Arial";
    ctx.fillText("🌍", earth.x, earth.y);
    ctx.restore();
    
    // Сяйво навколо Землі
    ctx.beginPath();
    ctx.arc(earth.x, earth.y, earth.radius + 10, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(0, 242, 255, ${earthSaturation/100})`;
    ctx.stroke();
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    drawEarth();
    
    objects = objects.filter(obj => {
        const active = obj.update();
        if (!active && obj.type === 'junk') {
            score++;
            percentText.textContent = Math.floor((score/targetScore)*100);
            if (score >= targetScore) winScreen.style.display = 'flex';
        }
        return active;
    });

    objects.forEach(obj => obj.draw());
    spawn();
    requestAnimationFrame(update);
}

// Обробка дотиків/свайпів
canvas.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    objects.forEach(obj => {
        if (Math.hypot(touch.clientX - obj.x, touch.clientY - obj.y) < 40) {
            draggedObj = obj;
        }
    });
});

canvas.addEventListener('touchmove', (e) => {
    if (draggedObj) {
        const touch = e.touches[0];
        const dx = touch.clientX - earth.x;
        const dy = touch.clientY - earth.y;
        
        draggedObj.isKicked = true;
        draggedObj.vx = (touch.clientX - draggedObj.x) * 0.5;
        draggedObj.vy = (touch.clientY - draggedObj.y) * 0.5;
        draggedObj.x = touch.clientX;
        draggedObj.y = touch.clientY;
    }
});

canvas.addEventListener('touchend', () => { draggedObj = null; });

update();
</script>
</body>
</html>
